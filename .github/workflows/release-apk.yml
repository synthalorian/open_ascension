name: Build & Deploy

on:
  push:
    branches: [ master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build Web
        run: flutter build web --release --base-href /open_ascension/

      - name: Upload APK & Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v0.2.0
          name: "Open Ascension v0.2.0"
          body: |
            The classless WoW companion app.

            🌐 **Web App:** https://synthalorian.github.io/open_ascension/

            ## Features
            - 141 real Mystical Enchants from the official wiki
            - 266 abilities across 9 classes
            - 200 gear items (Naxx, Ulduar, ICC, Emblem, PvP, Professions)
            - Visual talent tree with connecting lines & prereqs
            - Gear integration with live Stats tab
            - Build sharing via base64 codes

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
